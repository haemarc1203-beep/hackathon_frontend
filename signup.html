<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign up</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <section class="center">
        <div>
          <div class="brand">Di<span class="v">v</span>vy</div>
          <div class="subtitle">Join us today</div>
        </div>

        <a class="btn" href="#">
          <!-- simple Google dot -->
          <span
            style="
              width: 14px;
              height: 14px;
              border-radius: 50%;
              background: #ea4335;
              display: inline-block;
            "
          ></span>
          Sign up with Google
        </a>

        <a class="btn" href="#">
          <span
            style="
              width: 14px;
              height: 14px;
              border-radius: 50%;
              background: #111;
              display: inline-block;
            "
          ></span>
          Sign up with Apple
        </a>

        <div class="divider">OR</div>

        <a class="btn dark" href="signing_up.html"
          >Sign up with phone or email</a
        >

        <p class="small">
          By signing up, you agree to the Terms of Service and Privacy Policy,
          including cookie use.
        </p>

        <div style="height: 4px"></div>

        <p class="small" style="font-size: 12px; margin: 0">
          Already have an account?
        </p>
        <a class="btn ghost" href="login.html">Log in</a>
      </section>
    </main>
  </body>
</html>
