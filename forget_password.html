<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot password</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      .note {
        font-size: 12px;
        color: rgba(0, 0, 0, 0.55);
        line-height: 1.4;
        max-width: 320px;
        margin-top: 6px;
        text-align: left;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="center" style="gap: 16px">
        <!-- Title + description -->
        <div style="text-align: left; width: min(420px, 100%)">
          <h3 style="margin: 0; font-weight: 850">Forgot password</h3>
          <p class="note">Please enter your email to reset the password</p>
        </div>

        <!-- Card -->
        <div class="card" style="width: min(420px, 100%); padding: 22px">
          <!-- form: submit → reset_the_password.html -->
          <form action="reset_the_password.html" method="GET">
            <div class="field">
              <label>Your Email</label>
              <input
                type="email"
                name="email"
                placeholder="Enter your email"
                required
              />
            </div>

            <button
              class="btn ghost"
              type="submit"
              style="
                width: 100%;
                height: 44px;
                margin-top: 8px;
                border: 1px solid rgba(0, 0, 0, 0.35);
                background: transparent;
              "
            >
              Reset Password
            </button>
          </form>

          <!-- back to login -->
          <div style="text-align: center; margin-top: 14px">
            <a class="link" href="login.html">Back to Log in</a>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
