<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset the password</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      .otp-wrap {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin: 14px 0 16px;
      }
      .otp {
        width: 34px;
        height: 38px;
        border: 1px solid rgba(0, 0, 0, 0.35);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.25);
        text-align: center;
        font-size: 16px;
        outline: none;
      }
      .sub {
        font-size: 12px;
        color: rgba(0, 0, 0, 0.55);
        line-height: 1.4;
        max-width: 340px;
      }
      .tiny {
        font-size: 11px;
        color: rgba(0, 0, 0, 0.55);
        margin-top: 10px;
      }
      .tiny a {
        color: #0b6;
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="center" style="gap: 10px">
        <h3 style="margin: 0; font-weight: 800">Check your email</h3>
        <p class="sub" style="margin: 0; text-align: center">
          We sent a reset link to
          <span style="font-weight: 700">contact@dsocde.com</span><br />
          Enter 5 digit code that mentioned in the email
        </p>

        <form
          action="verifying_code.html"
          method="GET"
          style="
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
          "
        >
          <div class="otp-wrap" aria-label="Verification code">
            <input
              class="otp"
              inputmode="numeric"
              pattern="[0-9]*"
              maxlength="1"
            />
            <input
              class="otp"
              inputmode="numeric"
              pattern="[0-9]*"
              maxlength="1"
            />
            <input
              class="otp"
              inputmode="numeric"
              pattern="[0-9]*"
              maxlength="1"
            />
            <input
              class="otp"
              inputmode="numeric"
              pattern="[0-9]*"
              maxlength="1"
            />
            <input
              class="otp"
              inputmode="numeric"
              pattern="[0-9]*"
              maxlength="1"
            />
          </div>

          <button
            class="btn ghost"
            type="submit"
            style="width: 220px; height: 40px"
          >
            Verify Code
          </button>

          <div class="tiny">
            Haven’t got the email yet? <a href="#">Resend email</a>
          </div>
        </form>
      </section>
    </main>

    <script>
      const inputs = Array.from(document.querySelectorAll(".otp"));
      inputs.forEach((inp, i) => {
        inp.addEventListener("input", (e) => {
          inp.value = inp.value.replace(/[^0-9]/g, "").slice(0, 1);
          if (inp.value && i < inputs.length - 1) inputs[i + 1].focus();
        });
        inp.addEventListener("keydown", (e) => {
          if (e.key === "Backspace" && !inp.value && i > 0)
            inputs[i - 1].focus();
        });
      });
    </script>
  </body>
</html>
